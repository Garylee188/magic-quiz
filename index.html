<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扶桑似顏繪的童話迷蹤</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #f4f1ea; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        /* 自定義極小字體 */
        .text-tiny { font-size: 12px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-stone-800">

    <div id="app" class="flex-grow flex flex-col items-center w-full px-4">
        
        <div class="flex-grow flex items-center justify-center w-full max-w-md">
            <transition name="fade" mode="out-in">
                <div :key="currentNodeId" class="space-y-8 w-full">
                    
                    <div v-if="currentNode.options" class="space-y-8">
                        <div class="text-center">
                            <p class="text-lg leading-relaxed italic text-stone-600 mb-2">—— 童話世界一隅 ——</p>
                            <h1 class="text-2xl font-bold leading-snug">
                                {{ currentNode.text }}
                            </h1>
                        </div>

                        <div class="space-y-4">
                            <button 
                                v-for="opt in currentNode.options" 
                                @click="nextNode(opt.target_id)"
                                class="w-full py-4 px-6 rounded-xl border border-stone-300 bg-white/50 hover:bg-stone-200 transition-all duration-300 shadow-sm active:scale-95"
                            >
                                {{ opt.text }}
                            </button>
                        </div>
                    </div>

                    <div v-else class="bg-white/80 p-8 rounded-3xl shadow-xl border border-stone-200 text-center animate-in fade-in duration-1000">
                        <p class="text-stone-400 mb-2">你的童話分身</p>
                        <h2 class="text-3xl font-bold text-stone-900 mb-6">【 {{ currentNode.result_title }} 】</h2>
                        <p class="text-lg leading-relaxed text-stone-700">
                            {{ currentNode.result_description }}
                        </p>
                        <!-- 新增圖片顯示邏輯 -->
                        <img 
                            v-if="currentNodeId === 'res_drunkard'" 
                            src="角色圖片/酒鬼2.jpeg" 
                            alt="酒鬼角色圖片" 
                            class="mx-auto w-[90%] h-auto object-contain"
                        >
                        <button @click="reset" class="mt-10 text-stone-400 text-sm underline tracking-widest">
                            重新啟程
                        </button>
                    </div>

                </div>
            </transition>
        </div>

        <footer v-if="!currentNode.options" class="mt-auto mb-6 text-center space-y-1 text-stone-400 text-tiny tracking-widest w-full opacity-60">
            <p>子虛烏有，純屬虛構，如有雷同，開心就好</p>
            <p>製作者：扶桑、雨</p>
            <p>日期：202603</p>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const currentNodeId = ref('start');
                
                const quizData = {
                    'start': {
                        text: "當你在童話世界中醒來，抬頭看向天空，你看到的是？",
                        options: [
                            { text: "溫柔的月亮", target_id: "moon_path" },
                            { text: "柔軟的白雲", target_id: "sun_path" }
                        ]
                    },
                    'moon_path': {
                        text: "在銀色的月色下，你漫步在...",
                        options: [
                            { text: "熱鬧的城市街道", target_id: "moon_city" },
                            { text: "廣袤的大自然", target_id: "moon_nature" }
                        ]
                    },
                    'moon_city': {
                        text: "巷弄盡頭有一場神祕宴會，你會參加嗎？",
                        options: [
                            { text: "不參加，選擇在城裡其他地方逛逛", target_id: "moon_city_no_banquet" },
                            { text: "參加，歡快地加入其中", target_id: "moon_city_banquet" }
                        ]
                    },
                    'moon_city_no_banquet': {
                        text: "突然有個陌生精靈請你舉起右手，你的手掌是...",
                        options: [
                            { text: "朝上", target_id: "res_tree_hole" },
                            { text: "朝下", target_id: "res_candy_maker" }
                        ]
                    },
                    'moon_city_banquet': {
                        text: "桌上有兩樣物品，你的目光落在...",
                        options: [
                            { text: "一杯倒映著星光的美酒", target_id: "res_drunkard" },
                            { text: "一副逗趣的銀色面具", target_id: "res_jester" }
                        ]
                    },
                    'moon_nature': {
                        text: "湖面泛起漣漪，你發現湖裡有怪魚...",
                        options: [
                            { text: "嘗試捕捉，揭開神祕", target_id: "moon_nature_catch" },
                            { text: "無視魚，繼續前行", target_id: "moon_nature_ignore" }
                        ]
                    },
                    'moon_nature_catch': {
                        text: "你手中憑空出現了一件器物，那是...",
                        options: [
                            { text: "一柄鋒利的長劍", target_id: "res_hero" },
                            { text: "一根發光的魔法杖", target_id: "res_mage" }
                        ]
                    },
                    'moon_nature_ignore': {
                        text: "遠遠瞧見一隻巨大的白熊，你覺得...",
                        options: [
                            { text: "牠正朝著你走過來", target_id: "res_woodcutter" },
                            { text: "牠正慢慢遠離你", target_id: "res_bird" }
                        ]
                    },
                    'sun_path': {
                        text: "在和煦的陽光下，你打算前往...",
                        options: [
                            { text: "繁忙的城市中心", target_id: "sun_city" },
                            { text: "遼闊的大自然", target_id: "sun_nature" }
                        ]
                    },
                    'sun_city': {
                        text: "城裡正舉辦慶典，你打算參與嗎？",
                        options: [
                            { text: "不參與，在寧靜的小徑穿梭", target_id: "sun_city_no_banquet" },
                            { text: "參與，融入歡樂的人群", target_id: "sun_city_banquet" }
                        ]
                    },
                    'sun_city_no_banquet': {
                        text: "路邊有個來路不明的甜甜圈，你會...",
                        options: [
                            { text: "高興地把它吃掉", target_id: "res_wolf" },
                            { text: "觀察一下後，繞路離開", target_id: "res_villager" }
                        ]
                    },
                    'sun_city_banquet': {
                        text: "你為自己挑選了一件飾品，那是...",
                        options: [
                            { text: "隱隱發光的銀戒指", target_id: "res_godmother" },
                            { text: "華麗精美的寶石項鍊", target_id: "res_princess" }
                        ]
                    },
                    'sun_nature': {
                        text: "你來到一片寬廣翠綠的草皮，你會...",
                        options: [
                            { text: "躺下仰望悠閒的白雲", target_id: "sun_nature_lie" },
                            { text: "興奮地在草地上滾一圈", target_id: "sun_nature_roll" }
                        ]
                    },
                    'sun_nature_lie': {
                        text: "起身後繼續前行，你看見一座黑暗的山洞裡有一抹亮光，你覺得是...",
                        options: [
                            { text: "閃著光芒的魔法花卉", target_id: "res_flower_fairy" },
                            { text: "透著幽光的珍貴藥材", target_id: "res_witch" }
                        ]
                    },
                    'sun_nature_roll': {
                        text: "起身後，你的下一個動作是...",
                        options: [
                            { text: "輕輕地扶起倒地的草", target_id: "res_north_wind" },
                            { text: "快樂地跳起了舞", target_id: "res_gnome" }
                        ]
                    },
                    'res_tree_hole': { result_title: "樹洞精靈", result_description: "你是深林中的避風港，靜靜地收藏著人們無處安放的祕密。在你的懷抱裡，疲憊的靈魂總能找到安寧。" },
                    'res_candy_maker': { result_title: "糖果製造商", result_description: "你習慣用自己的雙手，將生活裡的苦澀揉成甜美的糖。你相信，一點點甜蜜就能點亮整座城市。" },
                    'res_drunkard': { result_title: "酒鬼", result_description: "你在星光下追逐夢境，不願被世俗束縛。你的靈魂帶著微醺的詩意，在現實與幻境的邊緣優雅漫步。" },
                    'res_jester': { result_title: "丑角", result_description: "你是用笑聲溫暖黑夜的人。你的幽默是一種深刻的溫柔，掩蓋了對世界最深沉的觀察與愛。" },
                    'res_hero': { result_title: "勇者", result_description: "雖然內心也會顫抖，但你依然選擇握緊劍柄。你的勇氣並非無所畏懼，而是為了守護重要的事物，挺身而出。" },
                    'res_mage': { result_title: "魔法師", result_description: "你在萬物的律動中尋找真理。對你而言，智慧是最高級的魔法，能看透所有迷霧。" },
                    'res_woodcutter': { result_title: "樵夫", result_description: "你像山一樣穩重且知足。即便事情找上門，也能平靜地與之共處，守護著自己的一方平靜。" },
                    'res_bird': { result_title: "飛鳥", result_description: "你是屬於天空的自由靈魂。愛追著有趣的事湊一腳，看看熱鬧又盡興而返，自在無拘。" },
                    'res_wolf': { result_title: "大野狼", result_description: "你擁抱內心的荒野本能，活得真實而純粹，追隨直覺引導的你有時容易被人誤會，但自己的快樂才是真的。" },
                    'res_villager': { result_title: "村民", result_description: "你懂得在平凡的柴米油鹽中發現樂趣。你的善良與知足，是童話故事裡最溫暖、也最真實的底色。" },
                    'res_godmother': { result_title: "神仙教母", result_description: "你是指引迷途者的微光。備受周遭信任的你，總是能用閃亮的仙粉襯托出最美麗的花。" },
                    'res_princess': { result_title: "公主", result_description: "你擁有一顆高貴且堅韌的心。富足的你總是優雅地行走在自己的道路上。" },
                    'res_flower_fairy': { result_title: "花仙子", result_description: "只要有你在的地方，連荒原都能開出繁花。你用純真與妙趣妝點世界，讓每個相遇都充滿生機。" },
                    'res_witch': { result_title: "森林女巫", result_description: "你在寂靜中提煉療癒的力量。雖然離群索居，卻是生命循環中不可或缺的神祕守護者。" },
                    'res_north_wind': { result_title: "北風", result_description: "你是穿過冰霜的風，默默的看著世間。你在力量中藏著極致的細膩，在平息騷動後，總會溫柔地撫平受傷的草地。" },
                    'res_gnome': { result_title: "地精", result_description: "你是土地的玩伴，在大地的脈動中快樂起舞。古靈精怪的你，總是能與世界的簡單純粹共鳴。" }
                };

                const currentNode = computed(() => quizData[currentNodeId.value] || quizData['start']);
                const nextNode = (id) => { currentNodeId.value = id; };
                const reset = () => { currentNodeId.value = 'start'; };

                return { currentNodeId, currentNode, nextNode, reset };
            }
        }).mount('#app');
    </script>
</body>
</html>
